<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Result</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="showResult()">

  <div class="overlay">
    <div class="result-wrapper">

      <p class="result-top-line">Your Freej x Rhode match is... ✨</p>

      <div class="result-card">

        <img id="result-image" class="result-main-img" alt="Result">

        <div class="result-inner-box">
          <h1 id="result-title"></h1>
          <p id="result-text"></p>
        </div>

      </div>

      <button class="restart-btn" onclick="restartQuiz()">Back to Home</button>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
